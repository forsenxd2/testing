            margin-top: 8px;
            margin-bottom: 4px;
        }

            padding-left: 1.15rem;
        }
        .rate-block li {
            font-size: 0.88rem;
            margin-bottom: 4px;
            color: #1e3d1e;
        }
        .empty-hint {
            text-align: center;
            padding: 28px 16px;
            color: #5a7a5a;
            font-size: 0.95rem;
        }
        .highlight {
            background: #fff59d;
            padding: 0 2px;
            border-radius: 2px;
        }
        #resultCount {
            text-align: center;
            font-size: 0.88rem;
            color: #3d6b3d;
            margin-bottom: 12px;
        }
        .doc-download {
            margin-top: 16px;
            text-align: left;
        }

            color: #1f6f1f;
            font-size: 0.92rem;
            text-decoration: underline;
            font-weight: 600;
        }

            color: #145414;
        }

            font-size: 1.65rem;
        }

            h1 {
                font-size: 1.15rem;
            }

                margin-bottom: 2px;
            }

            }

            body { background: #fff !important; }

            projects: 'Centa Riverside Từ Sơn; Nhà ở Việt Nhân số 2; Việt Nhân 3, 4',
            packages: [
                {
                    title: 'Cố định LS 24 tháng — DA VCB cấp tín dụng cho CĐT',
                    sections: [
                        {
                            subtitle: null,
                            lines: [
                                '12 tháng đầu: 10,9%/năm',
                                '12 tháng tiếp theo: 12%/năm'
                            ]
                        }
                    ]
                },
                {
                    title: 'Cố định LS 24 tháng — Dự án khác',
                    sections: [
                        {
                            subtitle: null,
                            lines: [
                                '12 tháng đầu: 11,3%/năm',
                                '12 tháng tiếp theo: 12,2%/năm'
                            ]
                        }
                    ]
                }
            ]
        }
    ];

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function highlightText(text, keyword) {
        if (!keyword) return escapeHtml(text);
        const esc = escapeHtml(text);
        const kw = keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (!kw) return esc;
        return esc.replace(new RegExp('(' + kw + ')', 'gi'), '<span class="highlight">$1</span>');
    }

    function itemSearchBlob(item) {
        return [
            item.phuLuc,
            item.nhom,
            item.investor,
            item.projects,
            JSON.stringify(item.packages)
        ].join(' ').toLowerCase();
    }

    function renderPackages(item, keyword) {
        return item.packages.map(function (pkg) {
            let html = '<div class="rate-block">';
            html += '<h6>' + highlightText(pkg.title, keyword) + '</h6>';
            pkg.sections.forEach(function (sec) {
                if (sec.subtitle) {
                    html += '<div class="rate-sub">' + highlightText(sec.subtitle, keyword) + '</div>';
                }
                html += '<ul>';
                sec.lines.forEach(function (line) {
                    html += '<li>' + highlightText(line, keyword) + '</li>';
                });
                html += '</ul>';
            });
            html += '</div>';
            return html;
        }).join('');
    }

    function renderCard(item, keyword) {
        const k = keyword.trim();
        return (
            '<article class="project-card" data-id="' + escapeHtml(item.id) + '">' +
            '<div class="nhom">' + highlightText(item.phuLuc + ' · ' + item.nhom, k) + '</div>' +
            '<div class="label-row"><strong>Chủ đầu tư (CĐT):</strong> ' + highlightText(item.investor, k) + '</div>' +
            '<div class="label-row"><strong>Dự án:</strong> ' + highlightText(item.projects, k) + '</div>' +
            renderPackages(item, k) +
            '</article>'
        );
    }

    function filterAndRender() {
        const input = document.getElementById('searchInput');
        const kw = (input && input.value) ? input.value.trim().toLowerCase() : '';
        const container = document.getElementById('cardsContainer');
        const countEl = document.getElementById('resultCount');

        const matched = !kw
            ? PROJECTS_DATA.slice()
            : PROJECTS_DATA.filter(function (item) {
                return itemSearchBlob(item).indexOf(kw) !== -1;
            });

        if (matched.length === 0) {
            container.innerHTML = '<div class="empty-hint">Không tìm thấy kết quả phù hợp. Thử từ khóa khác (tên CDT hoặc tên dự án).</div>';
            countEl.textContent = '0 phụ lục';
            return;
        }

        container.innerHTML = matched.map(function (item) {
            return renderCard(item, kw);
        }).join('');

        const total = PROJECTS_DATA.length;
        countEl.textContent = kw
            ? ('Hiển thị ' + matched.length + ' / ' + total + ' phụ lục')
            : ('Tổng ' + total + ' phụ lục');
    }

    document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('searchInput');
        filterAndRender();
        searchInput.addEventListener('input', filterAndRender);
    });
    </script>
</body>
</html>
